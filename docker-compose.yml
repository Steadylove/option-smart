services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend
    restart: unless-stopped
